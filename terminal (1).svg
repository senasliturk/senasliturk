<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .title-bar { fill: #1a1a2e; }
      .btn-red { fill: #ff5f57; }
      .btn-yellow { fill: #ffbd2e; }
      .btn-green { fill: #28c840; }
      .terminal-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 15px; }
      .cmd { fill: #00ff9f; font-weight: bold; }
      .output { fill: #00ff9f; }
      .cursor { fill: #00ff9f; }

      /* Pac-Man mouth animation */
      @keyframes pacmouth {
        0%,100% { d: path("M10,10 L20,10 A10,10 0 1,1 20,10 Z"); }
        50% { d: path("M10,10 L20,16 A10,10 0 1,1 20,4 Z"); }
      }
      @keyframes ghost-move {
        0% { transform: translateX(0px); }
        100% { transform: translateX(-60px); }
      }
      @keyframes pac-move {
        0% { transform: translateX(0px); }
        100% { transform: translateX(-60px); }
      }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes typing1 {
        0%,10% { opacity: 0; } 10%,100% { opacity: 1; }
      }
      @keyframes typing2 {
        0%,22% { opacity: 0; } 22%,100% { opacity: 1; }
      }
      @keyframes typing3 {
        0%,35% { opacity: 0; } 35%,100% { opacity: 1; }
      }
      @keyframes typing4 {
        0%,50% { opacity: 0; } 50%,100% { opacity: 1; }
      }
      @keyframes typing5 {
        0%,63% { opacity: 0; } 63%,100% { opacity: 1; }
      }
      @keyframes typing6 {
        0%,75% { opacity: 0; } 75%,100% { opacity: 1; }
      }
      @keyframes typing7 {
        0%,85% { opacity: 0; } 85%,100% { opacity: 1; }
      }
      @keyframes typing8 {
        0%,93% { opacity: 0; } 93%,100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="10" class="bg"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" class="title-bar"/>
  <rect width="800" height="20" y="16" class="title-bar"/>

  <!-- Buttons -->
  <circle cx="20" cy="18" r="6" class="btn-red"/>
  <circle cx="40" cy="18" r="6" class="btn-yellow"/>
  <circle cx="60" cy="18" r="6" class="btn-green"/>

  <!-- Title -->
  <text x="400" y="23" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#888">session — zsh — 120×40</text>

  <!-- Pac-Man and ghosts top right -->
  <g style="animation: pac-move 3s linear infinite alternate;">
    <!-- Pac-Man -->
    <g transform="translate(740, 10)">
      <path d="M8,8 L18,8 A10,10 0 1,1 18,8 Z" fill="#FFE000">
        <animate attributeName="d"
          values="M8,8 L18,5 A10,10 0 1,1 18,11 Z;M8,8 L18,8 A10,10 0 1,1 18,8 Z;M8,8 L18,5 A10,10 0 1,1 18,11 Z"
          dur="0.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  <!-- Ghost 1 pink -->
  <g transform="translate(760, 8)">
    <rect x="0" y="8" width="16" height="14" fill="#FF69B4" rx="8"/>
    <rect x="0" y="14" width="16" height="8" fill="#FF69B4"/>
    <polygon points="0,22 4,18 8,22 12,18 16,22" fill="#FF69B4"/>
    <circle cx="5" cy="13" r="3" fill="white"/>
    <circle cx="11" cy="13" r="3" fill="white"/>
    <circle cx="6" cy="14" r="1.5" fill="#0d0d0d"/>
    <circle cx="12" cy="14" r="1.5" fill="#0d0d0d"/>
  </g>
  <!-- Ghost 2 red -->
  <g transform="translate(780, 8)">
    <rect x="0" y="8" width="16" height="14" fill="#FF4444" rx="8"/>
    <rect x="0" y="14" width="16" height="8" fill="#FF4444"/>
    <polygon points="0,22 4,18 8,22 12,18 16,22" fill="#FF4444"/>
    <circle cx="5" cy="13" r="3" fill="white"/>
    <circle cx="11" cy="13" r="3" fill="white"/>
    <circle cx="6" cy="14" r="1.5" fill="#0d0d0d"/>
    <circle cx="12" cy="14" r="1.5" fill="#0d0d0d"/>
  </g>

  <!-- Terminal content -->
  <!-- Last login -->
  <text x="20" y="68" class="terminal-text output" style="animation: typing1 8s ease forwards; opacity:0;">Last login: today on ttys001</text>

  <!-- whoami -->
  <text x="20" y="100" class="terminal-text cmd" style="animation: typing2 8s ease forwards; opacity:0;">$ whoami</text>
  <text x="20" y="125" class="terminal-text output" style="animation: typing3 8s ease forwards; opacity:0;">  &gt; Junior Software Engineer 👩‍💻</text>

  <!-- cat skills -->
  <text x="20" y="157" class="terminal-text cmd" style="animation: typing3 8s ease forwards; opacity:0;">$ cat skills.txt</text>
  <text x="20" y="182" class="terminal-text output" style="animation: typing4 8s ease forwards; opacity:0;">  &gt; Python, OpenAI API, FastAPI</text>
  <text x="20" y="207" class="terminal-text output" style="animation: typing4 8s ease forwards; opacity:0;">  &gt; React, TypeScript, Node.js</text>
  <text x="20" y="232" class="terminal-text output" style="animation: typing4 8s ease forwards; opacity:0;">  &gt; Docker, AWS, MongoDB</text>

  <!-- ls hobbies -->
  <text x="20" y="264" class="terminal-text cmd" style="animation: typing5 8s ease forwards; opacity:0;">$ ls hobbies/</text>
  <text x="20" y="289" class="terminal-text output" style="animation: typing6 8s ease forwards; opacity:0;">  &gt; gaming/</text>
  <text x="20" y="314" class="terminal-text output" style="animation: typing6 8s ease forwards; opacity:0;">  &gt; music/</text>
  <text x="20" y="339" class="terminal-text output" style="animation: typing6 8s ease forwards; opacity:0;">  &gt; coding/</text>

  <!-- echo passion -->
  <text x="20" y="371" class="terminal-text cmd" style="animation: typing7 8s ease forwards; opacity:0;">$ echo $PASSION</text>
  <text x="20" y="396" class="terminal-text output" style="animation: typing8 8s ease forwards; opacity:0;">  &gt; Building amazing things... 🚀</text>

  <!-- Blinking cursor -->
  <rect x="20" y="403" width="9" height="14" class="cursor">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
